name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Use Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: "22.x"
      - name: Install dependencies
        run: npm ci --no-audit --no-fund || npm install --no-audit --no-fund
      - name: Run ESLint
        run: npm run lint

  test:
    name: Test on Node ${{ matrix.node }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ["22.x", "24.x"]
    steps:
      - uses: actions/checkout@v7
      - name: Use Node.js ${{ matrix.node }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
      - name: Install dependencies
        run: npm ci --no-audit --no-fund || npm install --no-audit --no-fund
      - name: Run tests
        run: npm test
      - name: Verify offline commands
        run: |
          node bin/google-trends-now.mjs categories > /dev/null
          node bin/google-trends-now.mjs --version
      - name: Verify the package publishes cleanly
        run: npm pack --dry-run
