name: Bug report
description: Report incorrect output, a crash, or a parsing failure
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. Please include the exact command and its output so the issue is reproducible.
        Do not paste secrets, tokens, or cookies.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you expect, and what did you get instead?
    validations:
      required: true
  - type: textarea
    id: command
    attributes:
      label: Command or code
      description: The CLI command or SDK call that triggers the bug.
      render: shell
      placeholder: google-trends-now trending --geo US --hours 48 --format json
    validations:
      required: true
  - type: textarea
    id: output
    attributes:
      label: Output
      description: The `fetch_status`/`error` fields or the stderr message. Trim large payloads.
      render: shell
    validations:
      required: false
  - type: input
    id: package-version
    attributes:
      label: Package version
      placeholder: 1.0.0 (google-trends-now --version)
    validations:
      required: true
  - type: input
    id: node-version
    attributes:
      label: Node.js version
      placeholder: v22.x (node --version)
    validations:
      required: true
  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I confirmed this is not a `manual_review_required` / `rss_limited` throttling response from Google (those are expected, not bugs).
          required: true
