name: Feature request
description: Suggest an enhancement within the project's scope
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        This project has a deliberately narrow scope: **Google Trends Trending Now only**.
        Out of scope (will not be accepted): Explore interest-over-time curves, browser automation,
        login flows, proxy rotation, CAPTCHA handling, or anti-bot bypass. See CONTRIBUTING.md.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to do that the current CLI/SDK does not support?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: The command, option, or export you would like, and roughly how it should behave.
    validations:
      required: true
  - type: checkboxes
    id: scope
    attributes:
      label: Scope
      options:
        - label: This request is about Trending Now discovery and does not require browser automation or anti-bot bypass.
          required: true
